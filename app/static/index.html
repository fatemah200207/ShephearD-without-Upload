<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shepheard's Hotel AI Chatbot</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --dark: #17110a;
      --dark-soft: #24190f;
      --brown: #342414;
      --cream: #fbf6eb;
      --cream-dark: #efe1c7;
      --white: #ffffff;
      --gold: #b8954f;
      --gold-dark: #7b5d24;
      --gold-soft: #d8c18a;
      --red: #d71920;
      --text: #1f180f;
      --muted: #8f806b;
      --border: rgba(123, 93, 36, 0.22);
      --shadow: 0 18px 45px rgba(45, 30, 12, 0.12);
      --radius: 18px;
    }

    html, body {
      height: 100%;
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: grid;
      grid-template-columns: 320px 1fr;
      grid-template-rows: 100vh;
    }

    .sidebar {
      background:
        radial-gradient(circle at top left, rgba(215, 25, 32, 0.22), transparent 34%),
        linear-gradient(180deg, var(--brown) 0%, var(--dark) 48%, #120d08 100%);
      color: var(--white);
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(216, 193, 138, 0.22);
      overflow: hidden;
    }

    .sidebar-brand {
      padding: 28px 26px 24px;
    }

    .brand-logos {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 26px;
      padding-bottom: 22px;
      border-bottom: 1px solid rgba(216, 193, 138, 0.35);
    }

    .logo-card {
      width: 100%;
      min-height: 86px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      padding: 12px 14px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
    }

    .logo-card.ecu {
      background: #050505;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .logo-card.hotel {
      background: #ffffff;
      border: 1px solid rgba(184,149,79,0.38);
    }

    .logo-ecu {
      max-width: 210px;
      max-height: 68px;
      object-fit: contain;
      display: block;
    }

    .logo-hotel {
      max-width: 135px;
      max-height: 66px;
      object-fit: contain;
      display: block;
    }

    .sidebar-brand h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 31px;
      font-weight: 400;
      line-height: 1.05;
      color: var(--white);
      margin-bottom: 8px;
    }

    .sidebar-brand p {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold-soft);
      font-weight: 900;
    }



    #pdfInput {
      width: 100%;
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      margin-bottom: 12px;
    }

    .upload-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: white;
      font-weight: 900;
      padding: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .upload-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(184,149,79,0.22);
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 24px 28px;
      border-top: 1px solid rgba(216,193,138,0.18);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.68);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
    }

    .status-dot.thinking {
      background: #f59e0b;
      animation: pulse 1s ease-in-out infinite;
    }

    .status-dot.error {
      background: #ef4444;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(184,149,79,0.16), transparent 35%),
        var(--cream);
      overflow: hidden;
    }

    .topbar {
      height: 84px;
      padding: 0 42px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,250,241,0.84);
      backdrop-filter: blur(14px);
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    .topbar-left h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      color: var(--text);
    }

    .topbar-left span {
      font-size: 14px;
      color: var(--muted);
      font-style: italic;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.55);
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold-dark);
      transition: 0.2s;
    }

    .icon-btn:hover {
      background: var(--white);
      box-shadow: var(--shadow);
    }

    #chatBox {
      flex: 1;
      overflow-y: auto;
      padding: 44px 70px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      scroll-behavior: smooth;
    }

    #chatBox::-webkit-scrollbar {
      width: 5px;
    }

    #chatBox::-webkit-scrollbar-thumb {
      background: var(--gold-soft);
      border-radius: 10px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .message-row {
      display: flex;
      gap: 16px;
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-row.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      margin-top: 4px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    .avatar.bot {
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: var(--white);
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
    }

    .avatar.user {
      background: var(--red);
      color: var(--white);
      font-size: 13px;
    }

    .bubble {
      max-width: 760px;
      padding: 18px 22px;
      line-height: 1.75;
      font-size: 16px;
      white-space: pre-wrap;
      border-radius: var(--radius);
    }

    .bubble.bot {
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      box-shadow: var(--shadow);
    }

    .bubble.user {
      background: #16110c;
      color: var(--white);
      border-top-right-radius: 4px;
      box-shadow: 0 16px 35px rgba(0,0,0,0.18);
    }

    .bubble-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      font-style: italic;
    }

    .message-row.user .bubble-meta {
      text-align: right;
    }

    .typing-row {
      display: none;
      gap: 14px;
      align-items: flex-start;
      padding-left: 70px;
      padding-bottom: 12px;
    }

    .typing-bubble {
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-top-left-radius: 4px;
      padding: 16px 20px;
      display: flex;
      gap: 6px;
      align-items: center;
      box-shadow: var(--shadow);
    }

    .typing-bubble span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold-dark);
      display: block;
      animation: dotBounce 1.3s ease-in-out infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .input-section {
      flex-shrink: 0;
      padding: 18px 42px 26px;
      background: rgba(255,250,241,0.92);
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 10px 12px 10px 18px;
      box-shadow: 0 12px 35px rgba(45, 30, 12, 0.12);
    }

    .input-wrapper:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(184,149,79,0.12);
    }

    #questionInput {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'Lato', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      resize: none;
      line-height: 1.6;
      min-height: 28px;
      max-height: 120px;
      overflow-y: auto;
      padding: 8px 0;
    }

    #questionInput::placeholder {
      color: #a99d8d;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      border: none;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(184,149,79,0.28);
    }

    .send-btn svg {
      color: #fff;
    }

    .input-hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    kbd {
      background: var(--cream-dark);
      border: 1px solid var(--border);
      border-radius: 5px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 2px 7px;
      color: var(--gold-dark);
    }

    @media (max-width: 800px) {
      body {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      #chatBox {
        padding: 28px 22px;
      }

      .bubble {
        max-width: 88%;
      }

      .topbar {
        padding: 0 20px;
      }

      .input-section {
        padding: 14px 18px 22px;
      }
    }
  </style>
</head>

<body>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logos">
        <div class="logo-card ecu">
          <img src="/static/logoo.png" class="logo-ecu" alt="Egyptian Chinese University logo">
        </div>

        <div class="logo-card hotel">
          <img src="/static/shep.jpeg" class="logo-hotel" alt="Shepheard Hotel logo">
        </div>
      </div>

      <h1>Shepheard's<br>Hotel</h1>
      <p>AI Chatbot</p>
    </div>

    

    <div class="sidebar-footer">
      <div class="status-pill">
        <div class="status-dot" id="sidebarDot"></div>
        <span id="sidebarStatus">Ready to assist</span>
      </div>
    </div>
  </aside>

  <main class="main">

    <div class="topbar">
      <div class="topbar-left">
        <h2>Conversation</h2>
        <span>How can we assist you today?</span>
      </div>

      <button class="icon-btn" title="Clear chat" onclick="clearChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
        </svg>
      </button>
    </div>

    <div id="chatBox">
      <div class="divider">Start of session</div>

      <div class="message-row">
        <div class="avatar bot">S</div>
        <div>
          <div class="bubble bot">Welcome to Shepheard's Hotel. I am ready to answer questions from the implemented project files.</div>
          <div class="bubble-meta">Just now</div>
        </div>
      </div>
    </div>

    <div class="typing-row" id="typingRow">
      <div class="avatar bot">S</div>
      <div class="typing-bubble">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="input-section">
      <div class="input-wrapper">
        <textarea
          id="questionInput"
          rows="1"
          placeholder="Ask anything about Shepheard Hotel..."
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>

        <button class="send-btn" onclick="sendQuestion()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

      <div class="input-hint">
        Press <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line
      </div>
    </div>

  </main>

  <script>
    const chatBox = document.getElementById("chatBox");
    const typingRow = document.getElementById("typingRow");
    const sidebarDot = document.getElementById("sidebarDot");
    const sidebarStatus = document.getElementById("sidebarStatus");
    const fileList = document.getElementById("fileList");

    function timestamp() {
      return new Date().toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function escapeHTML(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function addMessage(text, role) {
      const row = document.createElement("div");
      row.className = `message-row ${role}`;

      const initial = role === "user" ? "U" : "S";

      row.innerHTML = `
        <div class="avatar ${role}">${initial}</div>
        <div>
          <div class="bubble ${role}">${escapeHTML(text)}</div>
          <div class="bubble-meta">${timestamp()}</div>
        </div>
      `;

      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function setStatus(state) {
      sidebarDot.className = "status-dot";

      if (state === "thinking") {
        sidebarDot.classList.add("thinking");
        sidebarStatus.textContent = "Preparing response...";
        typingRow.style.display = "flex";
      } else if (state === "error") {
        sidebarDot.classList.add("error");
        sidebarStatus.textContent = "Connection error";
        typingRow.style.display = "none";
      } else {
        sidebarStatus.textContent = "Ready to assist";
        typingRow.style.display = "none";
      }

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function loadImplementedFiles() {
      try {
        const response = await fetch("/files");
        const data = await response.json();
        const files = data.files || [];

        if (!files.length) {
          fileList.innerHTML = "No implemented files found.<br>Add PDFs inside app/data/pdfs.";
          return;
        }

        fileList.innerHTML = files
          .map(file => `• ${escapeHTML(file)}`)
          .join("<br>");
      } catch (err) {
        fileList.innerHTML = "Could not load implemented files.";
        console.error(err);
      }
    }

    loadImplementedFiles();

    async function sendQuestion() {
      const input = document.getElementById("questionInput");
      const question = input.value.trim();

      if (!question) return;

      addMessage(question, "user");
      input.value = "";
      autoResize(input);
      setStatus("thinking");

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ question })
        });

        const data = await response.json();

        setStatus("ready");
        addMessage(data.answer || "No answer received.", "bot");

      } catch (err) {
        setStatus("error");
        addMessage("Network error. Please check that the backend is running.", "bot");
        console.error(err);
      }
    }

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendQuestion();
      }
    }

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 120) + "px";
    }

    function clearChat() {
      chatBox.innerHTML = `
        <div class="divider">Start of session</div>
        <div class="message-row">
          <div class="avatar bot">S</div>
          <div>
            <div class="bubble bot">Chat cleared. I am ready to answer questions.</div>
            <div class="bubble-meta">${timestamp()}</div>
          </div>
        </div>
      `;

      setStatus("ready");
    }
  </script>

</body>
</html>
